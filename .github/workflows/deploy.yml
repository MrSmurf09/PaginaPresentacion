name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --force

      - name: Create downloads directory
        run: mkdir -p public/downloads

      - name: Create sample files
        run: |
          echo "Sample APK file" > public/downloads/controlbovino.apk
          echo "Sample EXE file" > public/downloads/controlbovino.exe

      # Verificar la estructura del proyecto
      - name: List project structure
        run: find . -type f -not -path "*/node_modules/*" -not -path "*/.git/*" | sort

      # Eliminar cualquier archivo de API que pueda estar causando problemas
      - name: Remove API routes
        run: |
          rm -rf app/api
          find . -name "route.js" -o -name "route.ts" -o -name "route.tsx" | xargs rm -f || true

      # Crear un archivo vacío para la página principal si no existe
      - name: Ensure page.tsx exists
        run: |
          if [ ! -f "app/page.tsx" ]; then
            echo "Creating empty page.tsx"
            mkdir -p app
            echo "export default function Home() { return <div>Home</div>; }" > app/page.tsx
          fi

      - name: Build
        run: npm run build

      - name: Add .nojekyll file
        run: touch out/.nojekyll

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
