name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

# Configuración de permisos para el token de GitHub
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Create sample files
        run: |
          echo "Sample APK file" > downloads/controlbovino.apk
          echo "Sample EXE file" > downloads/controlbovino.exe

      - name: Add .nojekyll file
        run: touch .nojekyll

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
